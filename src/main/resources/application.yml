spring:
  application:
    name: eventflow-api

  datasource:
      url: jdbc:postgresql://localhost:5432/eventflow_db
      username: eventflow
      password: eventflow
      driver-class-name: org.postgresql.Driver

  jpa:
      hibernate:
        ddl-auto: none
      show-sql: true
      properties:
          hibernate:
            format_sql: true
